<!doctype html>
<html lang="kk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Онлайн шақыру</title>
    <meta name="robots" content="noindex, nofollow" />
  </head>
  <body>
    <main class="viewer-page" x-data="inviteViewer" x-cloak :data-theme="inviteData.theme" :data-opened="inviteOpened">
      <audio x-ref="bgMusic" :src="musicSrc" loop preload="auto"></audio>
      <section class="viewer-shell">
        <div class="invite-experience" :data-theme="inviteData.theme" :class="{ 'is-opened': inviteOpened }">
          <section
            class="open-screen"
            x-show="!inviteOpened"
            x-transition.opacity.duration.500ms
          >
            <template x-if="hasOpeningVideo">
              <section class="hero-opening">
                <div class="hero-opening-media">
                  <div
                    class="hero-opening-poster-bg"
                    :style="`background-image: url('${openingPosterSrc}')`"
                  ></div>

                  <video
                    class="hero-opening-video-bg"
                    x-ref="openingBgVideo"
                    autoplay
                    muted
                    loop
                    playsinline
                    preload="metadata"
                    :poster="openingPosterSrc"
                    aria-hidden="true"
                  >
                    <source :src="openingVideoWebmSrc" type="video/webm" />
                    <source :src="openingVideoMp4Src" type="video/mp4" />
                  </video>

                  <div class="hero-opening-center">
                    <div class="hero-opening-frame">
                      <div
                        class="hero-opening-poster"
                        :style="`background-image: linear-gradient(to top, rgba(27,18,19,.18), rgba(27,18,19,.04)), url('${openingPosterSrc}')`"
                      ></div>

                      <video
                        class="hero-opening-video"
                        x-ref="openingVideo"
                        autoplay
                        muted
                        loop
                        playsinline
                        preload="metadata"
                        :poster="openingPosterSrc"
                      >
                        <source :src="openingVideoWebmSrc" type="video/webm" />
                        <source :src="openingVideoMp4Src" type="video/mp4" />
                      </video>
                    </div>
                  </div>

                  <div class="hero-opening-overlay"></div>

                  <svg
                    class="hero-opening-veil"
                    viewBox="0 0 360 640"
                    preserveAspectRatio="none"
                    aria-hidden="true"
                    focusable="false"
                  >
                    <defs>
                      <linearGradient id="openingVeilFill" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="#fffdf8" stop-opacity=".72"></stop>
                        <stop offset="18%" stop-color="#fffaf0" stop-opacity=".92"></stop>
                        <stop offset="52%" stop-color="#f9f0df" stop-opacity=".97"></stop>
                        <stop offset="100%" stop-color="#f3e5cf" stop-opacity=".99"></stop>
                      </linearGradient>

                      <linearGradient id="openingVeilGold" x1="0" y1="0" x2="1" y2="0">
                        <stop offset="0%" stop-color="#b98935" stop-opacity=".08"></stop>
                        <stop offset="22%" stop-color="#d8b66c" stop-opacity=".86"></stop>
                        <stop offset="50%" stop-color="#f0d99b" stop-opacity=".96"></stop>
                        <stop offset="78%" stop-color="#d8b66c" stop-opacity=".86"></stop>
                        <stop offset="100%" stop-color="#b98935" stop-opacity=".08"></stop>
                      </linearGradient>
                    </defs>

                    <path
                      class="hero-opening-veil-cloth"
                      d="M-8 304 C42 272 82 292 126 284 C170 276 203 316 248 296 C293 276 328 286 368 268 L368 650 L-8 650 Z"
                      fill="url(#openingVeilFill)"
                    ></path>

                    <path
                      class="hero-opening-veil-fold"
                      d="M66 290 C92 386 76 518 94 650"
                    ></path>
                    <path
                      class="hero-opening-veil-fold hero-opening-veil-fold-center"
                      d="M182 290 C156 400 204 512 177 650"
                    ></path>
                    <path
                      class="hero-opening-veil-fold"
                      d="M286 286 C260 392 292 522 272 650"
                    ></path>

                    <path
                      class="hero-opening-veil-edge"
                      d="M-8 304 C42 272 82 292 126 284 C170 276 203 316 248 296 C293 276 328 286 368 268"
                      stroke="url(#openingVeilGold)"
                    ></path>

                    <g class="hero-opening-veil-mark">
                      <path d="M15 334 C29 334 29 320 42 320 C53 320 57 330 47 335 C40 339 35 333 39 327 M69 334 C55 334 55 320 42 320"></path>
                      <path d="M99 334 C113 334 113 320 126 320 C137 320 141 330 131 335 C124 339 119 333 123 327 M153 334 C139 334 139 320 126 320"></path>
                      <path d="M183 334 C197 334 197 320 210 320 C221 320 225 330 215 335 C208 339 203 333 207 327 M237 334 C223 334 223 320 210 320"></path>
                      <path d="M267 334 C281 334 281 320 294 320 C305 320 309 330 299 335 C292 339 287 333 291 327 M321 334 C307 334 307 320 294 320"></path>
                    </g>
                  </svg>
                </div>

                <div class="hero-opening-content">
                                    <div class="opening-lang-switch" aria-label="Выбор языка">
                    <button
                      type="button"
                      :class="{ 'is-active': inviteData.lang === 'kk' }"
                      @click="setLang('kk')"
                    >
                      ҚАЗ
                    </button>
                    <button
                      type="button"
                      :class="{ 'is-active': inviteData.lang === 'ru' }"
                      @click="setLang('ru')"
                    >
                      РУС
                    </button>
                  </div>
<p class="invite-kicker"><span x-text="t('inviteKicker')"></span></p>

                  <h1 class="open-title">
                    <span x-text="inviteData.groom"></span>
                    <span class="amp">&</span>
                    <span x-text="inviteData.bride"></span>
                  </h1>

                  <p class="open-text">
                    <span x-text="t('openText')"></span>
                  </p>

                  <button type="button" class="open-btn hero-open-btn" @click="openInvite">
                    <span x-text="t('openButton')"></span>
                    <span aria-hidden="true">→</span>
                  </button>
                </div>
              </section>
            </template>

            <template x-if="!hasOpeningVideo">
              <section class="open-card">
                                  <div class="opening-lang-switch" aria-label="Выбор языка">
                    <button
                      type="button"
                      :class="{ 'is-active': inviteData.lang === 'kk' }"
                      @click="setLang('kk')"
                    >
                      ҚАЗ
                    </button>
                    <button
                      type="button"
                      :class="{ 'is-active': inviteData.lang === 'ru' }"
                      @click="setLang('ru')"
                    >
                      РУС
                    </button>
                  </div>
<p class="invite-kicker"><span x-text="t('inviteKicker')"></span></p>

                <h1 class="open-title">
                  <span x-text="inviteData.groom"></span>
                  <span class="amp">&</span>
                  <span x-text="inviteData.bride"></span>
                </h1>

                <p class="open-text">
                  <span x-text="t('openText')"></span>
                </p>

                <button type="button" class="open-btn" @click="openInvite">
                  <span x-text="t('openButton')"></span>
                  <span aria-hidden="true">→</span>
                </button>
              </section>
            </template>
          </section><div class="opening-curtains" :class="{ 'is-active': openingAnimating, 'is-closing': openingPhase === 'closing', 'is-opening': openingPhase === 'opening' }">
            <div class="curtain-top"></div>
            <div class="curtain-bottom"></div>
          </div>

          <div
            class="invite-canvas"
            :data-theme="inviteData.theme"
            x-show="inviteOpened"
            x-transition.opacity
          >
            <template x-if="hasOpeningVideo">
              <div class="invite-blurred-bg" aria-hidden="true">
                <div
                  class="invite-blurred-poster"
                  :style="`background-image: url('${openingPosterSrc}')`"
                ></div>

                <video
                  class="invite-blurred-video"
                  autoplay
                  muted
                  loop
                  playsinline
                  preload="metadata"
                  :poster="openingPosterSrc"
                  tabindex="-1"
                >
                  <source
                    :src="openingVideoWebmSrc"
                    type="video/webm"
                  >
                  <source
                    :src="openingVideoMp4Src"
                    type="video/mp4"
                  >
                </video>

                <div class="invite-blurred-overlay"></div>
              </div>
            </template>
            <div class="decor-slot decor-top-left"></div>
            <div class="decor-slot decor-top-right"></div>
            <div class="decor-slot decor-bottom-left"></div>
            <div class="decor-slot decor-bottom-right"></div>
            <div class="decor-slot decor-watermark"></div>

            <section class="invite-cover reveal">
              <p class="invite-kicker"><span x-text="t('inviteKicker')"></span></p>
              <h2 class="invite-title">
                <span x-text="inviteData.groom"></span>
                <span class="amp">&</span>
                <span x-text="inviteData.bride"></span>
              </h2>
              <p class="invite-subtitle">
                <span x-text="inviteText('heroSubtitle')"></span>
              </p>
            </section>

            <section class="couple-video-section reveal">
              <div class="couple-video-frame">
                <video
                  class="couple-hands-video"
                  autoplay
                  muted
                  loop
                  playsinline
                  preload="metadata"
                >
                  <source
                    src="./assets/video/rahat-aqbota-hands.mp4"
                    type="video/mp4"
                  >
                </video>

                <div class="couple-video-overlay"></div>
              </div>
            </section>



            <section class="invite-card reveal">
              <p class="section-label"><span x-text="t('dearGuestsTitle')"></span></p>
              <p class="invite-text" x-text="inviteText('dearGuestsText')"></p>
            </section>

            <section
              class="invite-card date-card"
            >
              <p class="section-label"><span x-text="t('dateTitle')"></span></p>
              <div class="date-large" x-text="dateDay"></div>
              <div class="date-meta">
                <span x-text="dateMonth"></span>
                <span>·</span>
                <span x-text="inviteData.time"></span>
              </div>
              

              <section
                class="event-countdown"
                x-show="inviteData.blocks.countdown"
              >
                <p
                  class="event-countdown-title"
                  x-text="t('countdownTitle')"
                ></p>

                <div class="event-countdown-grid">
                  <div class="event-countdown-box">
                    <span
                      class="event-countdown-number"
                      x-text="countdownParts.days"
                    ></span>
                    <span
                      class="event-countdown-label"
                      x-text="t('countdownDays')"
                    ></span>
                  </div>

                  <div class="event-countdown-box">
                    <span
                      class="event-countdown-number"
                      x-text="countdownParts.hours"
                    ></span>
                    <span
                      class="event-countdown-label"
                      x-text="t('countdownHours')"
                    ></span>
                  </div>

                  <div class="event-countdown-box">
                    <span
                      class="event-countdown-number"
                      x-text="countdownParts.minutes"
                    ></span>
                    <span
                      class="event-countdown-label"
                      x-text="t('countdownMinutes')"
                    ></span>
                  </div>

                  <div class="event-countdown-box">
                    <span
                      class="event-countdown-number"
                      x-text="countdownParts.seconds"
                    ></span>
                    <span
                      class="event-countdown-label"
                      x-text="t('countdownSeconds')"
                    ></span>
                  </div>
                </div>
              </section>
            </section>

            <section class="invite-card reveal">
              <p class="section-label"><span x-text="t('venueTitle')"></span></p>
              <h3 class="invite-venue" x-text="inviteData.venue"></h3>
              <p
                class="invite-address"
                x-text="localizedAddress"
              ></p>

              <div class="map-actions" x-show="inviteData.blocks.map">
                <a class="map-btn" :href="inviteData.map2gis" x-show="inviteData.map2gis" target="_blank" rel="noopener noreferrer">
                  2GIS
                </a>
                <a class="map-btn" :href="inviteData.mapGoogle" x-show="inviteData.mapGoogle" target="_blank" rel="noopener noreferrer">
                  Google Maps
                </a>
              </div>
            </section>

            
            <section
              class="final-wedding-video-section reveal"
              aria-label="Үйлену тойының бейнесі"
            >
              <div class="final-wedding-video-frame">
                <video
                  class="final-wedding-video"
                  autoplay
                  muted
                  loop
                  playsinline
                  preload="metadata"
                >
                  <source
                    src="./assets/video/rahat-aqbota-final.mp4"
                    type="video/mp4"
                  >
                </video>

                <div class="final-wedding-video-overlay"></div>
              </div>
            </section>

            <section class="invite-card reveal" x-show="inviteData.blocks.dressCode">
              <p class="section-label">Dress code</p>
              <div class="palette-dots">
                <span></span><span></span><span></span><span></span>
              </div>
              <p class="invite-text">
                <span x-text="inviteText('dressCodeText')"></span>
              </p>
            </section>

            <section class="invite-card rsvp-card reveal">
              <p class="section-label" x-text="t('rsvpTitle')"></p>

              <h3 x-text="t('rsvpQuestion')"></h3>

              <button
                class="primary-btn"
                type="button"
                @click="openRsvp"
              >
                <span x-text="t('rsvpButton')"></span>
              </button>
            </section>

            <footer class="invite-footer">
              <p><span x-text="t('closingText')"></span></p>
              <strong>
                <span x-text="inviteData.groom"></span>
                &
                <span x-text="inviteData.bride"></span>
              </strong>

              <div class="wedding-hosts">
                <span
                  class="wedding-hosts-label"
                  x-text="inviteData.lang === 'ru'
                    ? 'Хозяева торжества'
                    : 'Той иелері'"
                >
                  Той иелері
                </span>

                <strong class="wedding-hosts-names">
                  Сері — Гүлнәр
                </strong>
              </div>
            </footer>
          </div>
        </div>
      </section>

      <div
        class="viewer-top-actions"
        x-show="inviteOpened"
        x-transition.opacity
      >
        <div class="viewer-lang-switch">
          <button
            type="button"
            :class="{ 'is-active': inviteData.lang === 'kk' }"
            @click="setLang('kk')"
          >
            ҚАЗ
          </button>

          <button
            type="button"
            :class="{ 'is-active': inviteData.lang === 'ru' }"
            @click="setLang('ru')"
          >
            РУС
          </button>
        </div>
      </div>


      <!-- BEGIN SCROLL INDICATOR -->
      <button
        class="scroll-indicator"
        type="button"
        x-show="inviteOpened && showScrollHint"
        x-transition.opacity.duration.350ms
        @click="scrollToContent"
        :aria-label="inviteData.lang === 'ru'
          ? 'Листайте вниз'
          : 'Төмен сырғытыңыз'"
        x-cloak
      >
        <svg
          class="scroll-indicator-icon"
          viewBox="0 0 40 76"
          aria-hidden="true"
        >
          <rect
            class="scroll-indicator-frame"
            x="9"
            y="3"
            width="22"
            height="39"
            rx="11"
          ></rect>

          <circle
            class="scroll-indicator-dot"
            cx="20"
            cy="13"
            r="2.4"
          ></circle>

          <path
            class="scroll-indicator-chevron scroll-indicator-chevron-first"
            d="M13 51 L20 58 L27 51"
          ></path>

          <path
            class="scroll-indicator-chevron scroll-indicator-chevron-second"
            d="M13 61 L20 68 L27 61"
          ></path>
        </svg>
      </button>
      <!-- END SCROLL INDICATOR -->

      <button
        class="music-fab"
        type="button"
        x-show="inviteOpened && inviteData.musicId !== 'none'"
        :class="{ 'is-playing': isMusicPlaying }"
        @click="toggleMusic"
        :aria-label="isMusicPlaying ? 'Музыканы өшіру' : 'Музыканы қосу'"
      >
        <svg x-show="!isMusicPlaying" class="music-icon music-icon-muted" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
        </svg>

        <svg x-show="isMusicPlaying" class="music-icon music-icon-playing" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
        </svg>
      </button>
      <div class="viewer-bottom-actions" x-show="inviteOpened" x-transition.opacity x-cloak>
        <a class="ghost-btn" :href="contactHref" x-show="inviteData.contactValue" target="_blank" rel="noopener noreferrer">
          <span x-text="t('contactButton')"></span>
        </a>

        <button class="primary-btn" type="button" x-show="inviteData.blocks.rsvp" @click="openRsvp">
          <span x-text="t('rsvpButton')"></span>
        </button>
      </div>
    </main>

    <script type="module" src="/src/js/viewer.js"></script>
</body>
</html>
